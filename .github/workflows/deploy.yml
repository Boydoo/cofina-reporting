name: Deploy → GitHub Pages

on:
  push:
    branches: [main]        # Déploiement automatique sur push main
  workflow_dispatch:         # Déploiement manuel depuis l'interface GitHub

# Permissions nécessaires pour déployer sur GitHub Pages
permissions:
  contents: read
  pages:    write
  id-token: write

# Un seul déploiement à la fois (annule les anciens si un push arrive pendant le deploy)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Étape 1 : Build React ──────────────────────────────────────
  build:
    name: Build React App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: client
        run: npm install

      - name: Build React (Vite)
        working-directory: client
        run: npm run build
        env:
          NODE_ENV: production

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist   # Dossier de build Vite

  # ── Étape 2 : Déploiement GitHub Pages ────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        run: |
          echo "## ✅ Déploiement réussi" >> $GITHUB_STEP_SUMMARY
          echo "- **URL :** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branche :** \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build :** React + Vite → \`client/dist\`" >> $GITHUB_STEP_SUMMARY

# ──────────────────────────────────────────────────────────────────────
# SETUP (à faire une seule fois sur GitHub) :
# 1. Aller sur GitHub → votre repo → Settings → Pages
# 2. Source → "GitHub Actions"
# 3. Sauvegarder
# 4. Pousser sur main → déploiement automatique !
#
# URL finale : https://VOTRE-USERNAME.github.io/cofina-reporting/
# ──────────────────────────────────────────────────────────────────────
